<svg width="1200" height="630"
    xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#bddff9;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="rgba(0,0,0,0.2)"/>
        </filter>
    </defs>

    <rect width="1200" height="630" fill="url(#grad)"/>

    <g transform="translate(150, 165)">
        <rect x="0" y="0" width="300" height="300" rx="60" fill="rgba(0,0,0,0.1)" transform="translate(10, 10)"/>
        <rect x="0" y="0" width="300" height="300" rx="60" fill="#0ea5e9" filter="url(#shadow)"/>
        <g transform="translate(30, 30) scale(12)">
            <path fill="white" fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/>
        </g>
    </g>

    <g transform="translate(500, 260)">
        <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="90" fill="#0369a1" dominant-baseline="hanging">Crop Image</text>
        <text x="0" y="140" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="40" fill="#0284c7">High Performance Image Cropper</text>
        <g transform="translate(0, 180)">
            <rect x="0" y="0" width="160" height="40" rx="20" fill="#0ea5e9" fill-opacity="0.2"/>
            <text x="80" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0284c7" font-weight="bold">Private</text>

            <rect x="180" y="0" width="160" height="40" rx="20" fill="#0ea5e9" fill-opacity="0.2"/>
            <text x="260" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0284c7" font-weight="bold">Fast</text>

            <rect x="360" y="0" width="160" height="40" rx="20" fill="#0ea5e9" fill-opacity="0.2"/>
            <text x="440" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0284c7" font-weight="bold">Secure</text>
        </g>
    </g>
</svg>
